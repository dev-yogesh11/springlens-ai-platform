
services:

  postgres:
    image: pgvector/pgvector:pg16
    container_name: springlens-postgres
    environment:
      POSTGRES_DB: springlens
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - springlens-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d springlens"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis/redis-stack-server:latest
    container_name: springlens-redis
    ports:
      - "6380:6379"
    volumes:
      - redisdata:/data
    networks:
      - springlens-net
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  ragas:
    image: spring-lens-ragas
    build:
      context: ./springlens-ragas-evaluator
      dockerfile: Dockerfile
    container_name: springlens-ragas
    ports:
      - "8088:8088"
    networks:
      - springlens-net
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - PORT=8088
    healthcheck:
      test: [ "CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8088/health')" ]
      interval: 60s
      timeout: 15s
      retries: 3

